<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索好老師 - Merge</title>
    <link rel="stylesheet" href="./assets/scss/all.scss" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <header class="border-bottom py-2 bg-white sticky-top">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex">
                    <a href="index.html" class="text-decoration-none">
                        <h1 class="nunito fst-italic display-5 pt-2 text-dark">Merge</h1>
                    </a>
                </div>
                <nav class="ms-auto pt-2">
                    <ul class="list-unstyled d-flex align-items-center mb-0">
                        <li>
                            <a href="#" class="text-decoration-none px-3 ms-auto text-dark">我要找學生</a>
                        </li>
                        <li>
                            <a href="explore.html" class="text-decoration-none px-3 text-dark fw-bold">我要找老師</a>
                        </li>
                        <li>
                            <a href="#" class="text-decoration-none px-3 text-dark">註冊送代幣</a>
                        </li>

                        <li id="auth-nav-item">
                            <a href="login.html" class="text-decoration-none px-3 pe-0 text-primary fw-bold">LOGIN</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <div class="explore-container">

        <header class="explore-header">
            <h1>探索好老師 🔍</h1>
            <p>在 Merge 找到最適合孩子的啟蒙導師，讓學習變成每天最期待的遊戲時間！</p>
        </header>

        <section class="explore-search-bar">
            <div class="search-item">
                🔍 <input type="text" id="searchInput" oninput="handleSearch()" placeholder="搜尋老師或課程名稱...">
            </div>
            <div class="divider"></div>

            <div class="search-item">
                📖 <select id="subjectSelect" onchange="handleSearch()">
                    <option value="">所有課程</option>
                    <option value="11">低年級課程</option>
                    <option value="12">中年級課程</option>
                    <option value="13">高年級課程</option>
                    <option value="21">GEPT 全民英檢</option>
                    <option value="22">YLE 劍橋兒童</option>
                    <option value="23">國中先修</option>
                    <option value="31">其他科目</option>
                </select>
            </div>
            <div class="divider"></div>

            <div class="search-item">
                📅 <select id="daySelect" onchange="handleSearch()">
                    <option value="">所有日期</option>
                    <option value="1">星期一</option>
                    <option value="2">星期二</option>
                    <option value="3">星期三</option>
                    <option value="4">星期四</option>
                    <option value="5">星期五</option>
                    <option value="6">星期六</option>
                    <option value="7">星期日</option>
                </select>
            </div>
            <div class="divider"></div>

            <div class="search-item">
                🕒 <select id="timeSelect" onchange="handleSearch()">
                    <option value="">所有時段</option>
                    <option value="morning">上午 (09:00 - 13:00)</option>
                    <option value="afternoon">下午 (13:00 - 17:00)</option>
                    <option value="evening">晚上 (17:00 - 21:00)</option>
                </select>
            </div>

            <button class="btn-search" onclick="handleSearch()">🔍 開始尋找</button>
        </section>

        <section id="course-list-container" class="course-grid">
            <h3 style="text-align: center; width: 100%; color: #666;">⏳ 課程資料載入中...</h3>
        </section>
    </div>

    <script>
        // --- JWT 導覽列邏輯 ---
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('jwt_token');
            const authNavItem = document.getElementById('auth-nav-item');

            if (token && authNavItem) {
                try {
                    let base64Url = token.split('.')[1];
                    let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    while (base64.length % 4) { base64 += '='; }
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(function (c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));

                    const payload = JSON.parse(jsonPayload);
                    const realName = payload.name || "會員";

                    authNavItem.innerHTML = `
                        <span style="color: #2563EB; font-weight: bold; padding: 0 15px;">👋 ${realName}</span>
                        <a href="#" onclick="logout()" style="text-decoration: none; color: #d9534f; font-weight: bold; border-left: 2px solid #d9534f; padding-left: 15px;">登出</a>
                    `;
                } catch (e) {
                    console.error("Token 解析失敗:", e);
                }
            }
            fetchCourses();
        });

        function logout() {
            if (confirm('確定要登出嗎？')) {
                localStorage.removeItem('jwt_token');
                localStorage.removeItem('userId');
                alert('已成功登出！');
                window.location.reload();
            }
        }

        // --- Axios 撈取資料與搜尋邏輯 ---
        const API_BASE_URL = 'http://localhost:8080/api';

        let allCoursesData = []; // 🌟 用來存放從後端撈回來的「所有原始資料」

        // 網頁載入時呼叫的 API
       // 🌟 修正後的 fetchCourses (移除了重複嵌套)
        async function fetchCourses() {
            const container = document.getElementById('course-list-container');
            container.innerHTML = '<h3 style="text-align: center; width: 100%; color: #666;">⏳ 課程資料載入中...</h3>';

            try {
                // 1. 確認網址是對的 (對齊組員 Controller 的 /api/view/courses)
                const response = await axios.get(`${API_BASE_URL}/view/courses`);

                // 2. 組員用的是 Page 物件，資料在 content 裡
                allCoursesData = response.data.content;

                console.log("成功拿到資料：", allCoursesData); 

                // 3. 渲染卡片
                renderCards(allCoursesData);

            } catch (error) {
                console.error("撈取課程資料失敗:", error);
                container.innerHTML = '<h3 style="text-align: center; width: 100%; color: #d9534f;">🚨 無法連線到伺服器</h3>';
            }
        }
        // 🌟 獨立出來的「渲染卡片」功能
        function renderCards(coursesToRender) {
            const container = document.getElementById('course-list-container');
            container.innerHTML = ''; // 先清空容器

            if (coursesToRender.length === 0) {
                container.innerHTML = '<h3 style="text-align: center; width: 100%; color: #999;">沒有找到符合條件的課程喔！換個關鍵字試試吧 🥺</h3>';
                return;
            }

            // 把傳進來的陣列變成 HTML
            coursesToRender.forEach(course => {
                const cardHTML = `
                    <div class="course-card">
                        <div class="tutor-avatar">
                            <img src="${course.avatarUrl || 'https://via.placeholder.com/80'}" alt="頭像">
                        </div>
                        
                        <div class="tutor-info">
                            <h2>${course.teacherName || '老師名字'}</h2>
                            <span class="badge">⭐ ${course.title || '優質教師'}</span>
                        </div>
                        
                        <h3 class="course-title">${course.courseName || '課程名稱'}</h3>
                        <p class="course-desc">${course.description || '這是一堂非常棒的課程！'}</p>
                        
                        <div class="card-footer">
                            <div class="price-info">
                                <div class="label">正式課單堂</div>
                                <div class="price">NT$ ${course.price || 0}</div>
                            </div>
                            <a href="student-booking.html?courseId=${course.id}" style="text-decoration:none;">
                                <button class="btn-book">立即預約 👉</button>
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const subjectValue = document.getElementById('subjectSelect').value;
            // 🌟 新增：抓取星期與時段
            const dayValue = document.getElementById('daySelect').value;
            const timeValue = document.getElementById('timeSelect').value;

            const filteredCourses = allCoursesData.filter(course => {
                const matchKeyword = !keyword ||
                    (course.teacherName && course.teacherName.toLowerCase().includes(keyword)) ||
                    (course.courseName && course.courseName.toLowerCase().includes(keyword));

                const matchSubject = !subjectValue || course.subject == subjectValue;

                // 🌟 核心：時段過濾邏輯
                let matchSchedule = true;
                if (dayValue || timeValue) {
                    // 如果使用者選了星期或時段，就去 course.availableSlots 裡面找
                    // 只要有一個時段符合「星期-時段」的組合即可
                    matchSchedule = course.availableSlots.some(slot => {
                        const [sDay, sTime] = slot.split('-'); // 拆解出 "1" 和 "morning"
                        const dayCondition = !dayValue || sDay === dayValue;
                        const timeCondition = !timeValue || sTime === timeValue;
                        return dayCondition && timeCondition;
                    });
                }

                return matchKeyword && matchSubject && matchSchedule;
            });

            renderCards(filteredCourses);
        }
    </script>
</body>

</html>
