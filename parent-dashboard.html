<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuteABC | 家庭學習中心</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 字體與圖示 -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <style>
        :root {
            --brand-orange: #FF5533;
            --brand-orange-hover: #E84420;
            --brand-orange-light: #FFF3F0;
            --brand-orange-bg: #FFF7F5;
            --brand-blue-light: #EFF6FF;
            --brand-green: #16A34A;
            --brand-green-bg: #DCFCE7;
            --brand-yellow: #F59E0B;
            --brand-yellow-bg: #FEF9C3;
            --tw-slate-50: #f8fafc;
            --tw-slate-100: #f1f5f9;
            --tw-slate-200: #e2e8f0;
            --tw-slate-400: #94a3b8;
            --tw-slate-500: #64748b;
            --tw-slate-600: #475569;
            --tw-slate-700: #334155;
            --tw-slate-800: #1e293b;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--tw-slate-50);
            color: var(--tw-slate-700);
        }

        .font-display {
            font-family: 'Fredoka', 'Noto Sans TC', cursive;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400;
            font-size: 20px;
            display: inline-flex;
            align-items: center;
        }

        .icon-filled {
            font-variation-settings: 'FILL' 1 !important;
        }

        /* ===== Sidebar ===== */
        .sidebar-main {
            width: 260px;
            min-width: 260px;
            background-color: #fff;
            border-right: 1px solid var(--tw-slate-100);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        @media (max-width: 991.98px) {
            .sidebar-main {
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                z-index: 1060;
                transform: translateX(-100%);
            }

            .sidebar-main.show {
                transform: translateX(0);
            }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.3);
                z-index: 1059;
            }

            .sidebar-overlay.show {
                display: block;
            }
        }

        .sidebar-logo {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--tw-slate-100);
        }

        .sidebar-logo .brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--tw-slate-800);
            line-height: 1.2;
        }

        .sidebar-logo .brand-sub {
            font-size: 0.75rem;
            color: var(--tw-slate-500);
        }

        .sidebar-logo .rocket-icon {
            width: 36px;
            height: 36px;
            background: var(--brand-orange);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
        }

        /* Nav items */
        .sidebar-nav {
            flex: 1;
            padding: 12px 12px;
            overflow-y: auto;
        }

        .nav-item-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            color: var(--tw-slate-600);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            margin-bottom: 2px;
            position: relative;
        }

        .nav-item-link:hover {
            background-color: var(--tw-slate-100);
            color: var(--tw-slate-800);
        }

        .nav-item-link.active {
            background-color: var(--brand-orange-light);
            color: var(--brand-orange);
            font-weight: 700;
        }

        .nav-item-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 4px;
            background-color: var(--brand-orange);
            border-radius: 0 4px 4px 0;
        }

        /* Bottom balance card */
        .sidebar-balance {
            margin: 12px;
            padding: 14px 16px;
            background: #fff;
            border: 1px solid var(--tw-slate-200);
            border-radius: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .balance-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--brand-orange);
            background: var(--brand-orange-light);
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 6px;
        }

        .balance-amount {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--tw-slate-800);
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .btn-topup {
            display: block;
            width: 100%;
            padding: 8px;
            background: var(--brand-orange);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-topup:hover {
            background: var(--brand-orange-hover);
        }

        /* ===== Main content ===== */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
        }

        @media (max-width: 991.98px) {
            .main-content {
                padding: 20px 16px;
            }
        }

        /* Welcome banner */
        .welcome-banner {
            background: var(--brand-blue-light);
            border-radius: 16px;
            padding: 24px 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .welcome-avatar {
            width: 64px;
            height: 64px;
            background: #D97706;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
            border: 3px solid #F59E0B;
        }

        .welcome-title {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--tw-slate-800);
            line-height: 1.3;
            margin: 0 0 4px;
        }

        .welcome-sub {
            font-size: 0.9rem;
            color: var(--tw-slate-500);
            margin: 0;
        }

        /* Stats row */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 575.98px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: #fff;
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }

        .stat-icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon-wrap.blue {
            background: var(--brand-blue-light);
            color: #2563EB;
        }

        .stat-icon-wrap.yellow {
            background: var(--brand-yellow-bg);
            color: var(--brand-yellow);
        }

        .stat-icon-wrap .material-symbols-outlined {
            font-size: 26px;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--tw-slate-400);
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--tw-slate-800);
        }

        /* Upcoming class card */
        .class-card {
            background: #fff;
            border-radius: 16px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }

        .class-date-box {
            background: var(--brand-orange-light);
            border-radius: 12px;
            padding: 10px 14px;
            text-align: center;
            flex-shrink: 0;
            min-width: 60px;
        }

        .class-date-label {
            font-size: 0.7rem;
            color: var(--tw-slate-500);
            font-weight: 500;
        }

        .class-date-time {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--brand-orange);
            line-height: 1.2;
        }

        .class-info {
            flex: 1;
            min-width: 0;
        }

        .class-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--brand-green);
            background: var(--brand-green-bg);
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 4px;
        }

        .class-name {
            font-size: 1.15rem;
            font-weight: 900;
            color: var(--tw-slate-800);
            margin: 0 0 4px;
        }

        .class-meta {
            font-size: 0.8rem;
            color: var(--tw-slate-400);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .class-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .class-meta .material-symbols-outlined {
            font-size: 15px;
        }

        .btn-enter {
            background: var(--brand-orange);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 10px 22px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .btn-enter:hover {
            background: var(--brand-orange-hover);
        }

        /* Mobile header */
        .mobile-header {
            display: none;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid var(--tw-slate-100);
            align-items: center;
            gap: 12px;
        }

        @media (max-width: 991.98px) {
            .mobile-header {
                display: flex;
            }
        }

        .btn-hamburger {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--tw-slate-600);
            padding: 4px;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="d-flex flex-column flex-lg-row vh-100">

        <!-- Sidebar overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

        <!-- ===== Left Sidebar ===== -->
        <aside class="sidebar-main" id="sidebarMain">

            <!-- Logo -->
            <div class="sidebar-logo d-flex align-items-center gap-2">
                <div class="rocket-icon">
                    <span class="material-symbols-outlined icon-filled" style="font-size:18px;">rocket_launch</span>
                </div>
                <div>
                    <div class="brand-name font-display">CuteABC</div>
                    <div class="brand-sub">家庭學習中心</div>
                </div>
            </div>

            <!-- Nav -->
            <nav class="sidebar-nav">
                <a href="#" class="nav-item-link active">
                    <span class="material-symbols-outlined icon-filled">home</span>
                    探索首頁
                </a>
                <a href="#" class="nav-item-link">
                    <span class="material-symbols-outlined">menu_book</span>
                    學習紀錄
                </a>
                <a href="#" class="nav-item-link">
                    <span class="material-symbols-outlined">bar_chart</span>
                    學習報告
                </a>
                <a href="#" class="nav-item-link">
                    <span class="material-symbols-outlined">chat_bubble</span>
                    訊息中心
                </a>
                <a href="#" class="nav-item-link">
                    <span class="material-symbols-outlined">credit_card</span>
                    儲值與明細
                </a>
                <a href="#" class="nav-item-link">
                    <span class="material-symbols-outlined">settings</span>
                    帳戶設定
                </a>
            </nav>

            <!-- Balance card -->
            <div class="sidebar-balance">
                <div class="balance-badge">
                    <span class="material-symbols-outlined icon-filled" style="font-size:12px;">toll</span>
                    我的學習金餘額
                </div>
                <div class="balance-amount">NT$ 8,000</div>
                <button class="btn-topup">去儲值 &nbsp;›</button>
            </div>
        </aside>

        <!-- ===== Right content wrapper ===== -->
        <div class="d-flex flex-column flex-grow-1 overflow-hidden">

            <!-- Mobile header -->
            <div class="mobile-header">
                <button class="btn-hamburger" onclick="openSidebar()">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <span class="font-display fw-bold" style="font-size:1.1rem; color:var(--tw-slate-800);">CuteABC</span>
            </div>

            <!-- Main content -->
            <main class="main-content">

                <!-- Welcome banner -->
                <div class="welcome-banner">
                    <div class="welcome-avatar">🤩</div>
                    <div>
                        <h1 class="welcome-title">親愛的家長，歡迎回來！</h1>
                        <p class="welcome-sub">以下是 Leo 接下來的學習任務：</p>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-icon-wrap blue">
                            <span class="material-symbols-outlined icon-filled">menu_book</span>
                        </div>
                        <div>
                            <div class="stat-label">學習進度</div>
                            <div class="stat-value">本月已上課：5 堂</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-wrap yellow">
                            <span class="material-symbols-outlined icon-filled">star</span>
                        </div>
                        <div>
                            <div class="stat-label">Leo 的星星</div>
                            <div class="stat-value">已收集 12 顆</div>
                        </div>
                    </div>
                </div>

                <!-- Upcoming class -->
                <div class="class-card">
                    <div class="class-date-box">
                        <div class="class-date-label">今天</div>
                        <div class="class-date-time">19:00</div>
                    </div>
                    <div class="class-info">
                        <span class="class-badge">即將開始</span>
                        <h2 class="class-name">Leo 的趣味發音課</h2>
                        <div class="class-meta">
                            <span>
                                <span class="material-symbols-outlined">person</span>
                                Sunny 老師
                            </span>
                            <span>
                                <span class="material-symbols-outlined">schedule</span>
                                今天 19:00 - 19:50
                            </span>
                        </div>
                    </div>
                    <button class="btn-enter">
                        進入教室
                        <span class="material-symbols-outlined" style="font-size:18px;">chevron_right</span>
                    </button>
                </div>

            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openSidebar() {
            document.getElementById('sidebarMain').classList.add('show');
            document.getElementById('sidebarOverlay').classList.add('show');
        }
        function closeSidebar() {
            document.getElementById('sidebarMain').classList.remove('show');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
    </script>
</body>

</html>
