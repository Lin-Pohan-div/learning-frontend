<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge | 訊息中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/all.css">
</head>

<body class="student-chat-page">

    <!-- ===== Hamburger (mobile only) ===== -->
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="開啟選單">
        <span class="material-symbols-outlined">menu</span>
    </button>

    <!-- ===== 左側導覽列 ===== -->
    <aside class="student-sidebar" id="student-sidebar">
        <div class="student-sidebar-logo">
            <div class="logo-icon">M</div>
            <div class="logo-text">
                Merge
                <span>學生總台</span>
            </div>
        </div>
        <nav class="flex-grow-1 py-2">
            <a href="StudentChat.html" class="student-nav-link active">
                <span class="material-symbols-outlined">chat_bubble</span>
                <span class="nav-label">訊息中心</span>
            </a>
            <a href="explore.html" class="student-nav-link">
                <span class="material-symbols-outlined">search</span>
                <span class="nav-label">找老師</span>
            </a>
            <a href="booking.html" class="student-nav-link">
                <span class="material-symbols-outlined">calendar_month</span>
                <span class="nav-label">我的課程</span>
            </a>
        </nav>
        <div class="student-sidebar-footer" id="logout-btn">
            <img src="https://i.pravatar.cc/38?img=5" alt="頭像" class="student-avatar">
            <div class="student-info">
                <div class="student-name">林小明</div>
                <div class="student-role">學生</div>
            </div>
            <span class="material-symbols-outlined logout-icon">logout</span>
        </div>
    </aside>

    <!-- ===== Sidebar overlay (mobile) ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== 主內容區（對話列表 + 聊天視窗）===== -->
    <main class="chat-layout">

        <!-- 中欄：對話列表 -->
        <section class="chat-list-panel">
            <div class="chat-list-header">
                <h2 class="chat-list-title"><span>訊息中心</span></h2>
            </div>

            <!-- 搜尋框 -->
            <div class="chat-search-wrap">
                <span class="material-symbols-outlined chat-search-icon">search</span>
                <input type="text" class="chat-search-input" placeholder="搜尋老師或科目…" id="searchInput">
            </div>

            <!-- 對話列表 -->
            <ul class="chat-list" id="chatList">
                <li class="chat-item active" data-id="0">
                    <div class="contact-avatar-wrap">
                        <img src="https://i.pravatar.cc/44?img=47" alt="Sarah Chen" class="contact-avatar">
                    </div>
                    <div class="chat-item-body">
                        <div class="chat-item-top">
                            <span class="contact-name">Sarah Chen</span>
                            <span class="contact-time">10:32</span>
                        </div>
                        <div class="chat-item-bottom">
                            <span class="contact-preview">好的！那我們下次課繼續練習發…</span>
                            <span class="unread-badge">2</span>
                        </div>
                        <span class="subject-tag">英文會話</span>
                    </div>
                </li>
                <li class="chat-item" data-id="1">
                    <div class="contact-avatar-wrap">
                        <img src="https://i.pravatar.cc/44?img=12" alt="David Wang" class="contact-avatar">
                    </div>
                    <div class="chat-item-body">
                        <div class="chat-item-top">
                            <span class="contact-name">David Wang</span>
                            <span class="contact-time">昨天</span>
                        </div>
                        <div class="chat-item-bottom">
                            <span class="contact-preview">請記得預習第五課的商務郵件範例。</span>
                        </div>
                        <span class="subject-tag">商用英文</span>
                    </div>
                </li>
                <li class="chat-item" data-id="2">
                    <div class="contact-avatar-wrap">
                        <img src="https://i.pravatar.cc/44?img=32" alt="Amy Liu" class="contact-avatar">
                    </div>
                    <div class="chat-item-body">
                        <div class="chat-item-top">
                            <span class="contact-name">Amy Liu</span>
                            <span class="contact-time">週一</span>
                        </div>
                        <div class="chat-item-bottom">
                            <span class="contact-preview">你的進步非常大，繼續加油！</span>
                        </div>
                        <span class="subject-tag">英文文法</span>
                    </div>
                </li>
                <li class="chat-item" data-id="3">
                    <div class="contact-avatar-wrap">
                        <img src="https://i.pravatar.cc/44?img=8" alt="Kevin Ho" class="contact-avatar">
                    </div>
                    <div class="chat-item-body">
                        <div class="chat-item-top">
                            <span class="contact-name">Kevin Ho</span>
                            <span class="contact-time">3/18</span>
                        </div>
                        <div class="chat-item-bottom">
                            <span class="contact-preview">下週的課我改到週四下午三點…</span>
                            <span class="unread-badge">1</span>
                        </div>
                        <span class="subject-tag">英文口說</span>
                    </div>
                </li>
            </ul>
        </section>

        <!-- 右欄：聊天視窗 -->
        <section class="chat-window">
            <!-- 頂部 header -->
            <div class="chat-header" id="chatHeader">
                <button class="chat-back-btn" id="chatBackBtn" aria-label="返回">
                    <span class="material-symbols-outlined">arrow_back</span>
                </button>
                <div class="contact-avatar-wrap">
                    <img src="https://i.pravatar.cc/44?img=47" alt="Sarah Chen" class="contact-avatar" id="headerAvatar">
                </div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="headerName">Sarah Chen</div>
                    <span class="subject-tag" id="headerTag">英文會話</span>
                </div>
            </div>

            <!-- 訊息區 -->
            <div class="chat-messages" id="chatMessages">
                <!-- 訊息由 JS 動態渲染 -->
            </div>

            <!-- 輸入列 -->
            <div class="chat-input-bar">
                <button class="attach-btn" title="附件">
                    <span class="material-symbols-outlined">attach_file</span>
                </button>
                <input type="text" class="chat-input" id="msgInput"
                    placeholder="輸入訊息… (Enter 送出、Shift+Enter 換行)">
                <button class="send-btn" id="sendBtn">
                    <span class="material-symbols-outlined">send</span>
                </button>
            </div>
        </section>

    </main>

    <script src="./StudentChat.js"></script>
    <script>
        // RWD interactions
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const chatBackBtn = document.getElementById('chatBackBtn');

        hamburgerBtn.addEventListener('click', () => {
            document.body.classList.toggle('sidebar-open');
        });

        sidebarOverlay.addEventListener('click', () => {
            document.body.classList.remove('sidebar-open');
        });

        chatBackBtn.addEventListener('click', () => {
            document.body.classList.remove('mobile-show-chat');
        });

        document.getElementById('chatList').addEventListener('click', (e) => {
            if (window.innerWidth < 576) {
                document.body.classList.add('mobile-show-chat');
            }
        });
    </script>
</body>

</html>
