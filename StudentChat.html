<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge | 訊息中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/scss/all.scss">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400;
            font-size: 20px;
            vertical-align: middle;
        }

        /* 訊息頁主內容區：flex 欄排，讓聊天視窗撐滿高度 */
        .student-main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }

        /* 聊天視窗撐滿剩餘空間 */
        .student-chat-wrap {
            flex: 1;
            min-height: 0;
        }

        /* 空白佔位提示 */
        .chat-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: #aaa;
        }

        .chat-empty-state .empty-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #F5F7FF;
            border: 2px solid #000;
            box-shadow: 3px 3px 0 #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-empty-state .empty-icon .material-symbols-outlined {
            font-size: 32px;
            color: #0055FF;
        }

        .chat-empty-state p {
            font-size: 0.88rem;
            font-weight: 600;
            margin: 0;
        }

        /* 上傳失敗提示 */
        .msg-upload-error {
            font-size: 0.8rem;
            color: #FF4433;
            text-align: center;
            padding: 6px 12px;
        }
    </style>
</head>

<body>

    <!-- 手機版頂部 Header -->
    <header class="student-mobile-header">
        <button class="btn-menu" id="sidebar-toggle">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <span class="logo-text nunito fst-italic">Merge</span>
        <div style="width: 40px;"></div>
    </header>

    <!-- 手機版遮罩 -->
    <div class="student-overlay" id="sidebar-overlay"></div>

    <div class="student-layout">

        <!-- ===== 左側導覽列 ===== -->
        <aside class="student-sidebar" id="student-sidebar">
            <div class="student-sidebar-logo">
                <div class="logo-icon">M</div>
                <div class="logo-text">
                    Merge
                    <span>學生後台</span>
                </div>
            </div>
            <nav class="flex-grow-1 py-2">
                <a href="student-dashboard.html" class="student-nav-link">
                    <span class="material-symbols-outlined">grid_view</span> 控制台
                </a>
                <a href="StudentChat.html" class="student-nav-link active">
                    <span class="material-symbols-outlined">chat_bubble</span> 訊息中心
                </a>
                <a href="explore.html" class="student-nav-link">
                    <span class="material-symbols-outlined">search</span> 找老師
                </a>
                <a href="booking.html" class="student-nav-link">
                    <span class="material-symbols-outlined">calendar_month</span> 我的課程
                </a>
                <a href="student-learning-records.html" class="student-nav-link">
                    <span class="material-symbols-outlined">history</span> 學習紀錄
                </a>
                <a href="student-credits.html" class="student-nav-link">
                    <span class="material-symbols-outlined">account_balance_wallet</span> 儲值明細
                </a>
                <a href="student-settings.html" class="student-nav-link">
                    <span class="material-symbols-outlined">settings</span> 設定
                </a>
            </nav>
            <div class="student-sidebar-footer" id="logout-btn">
                <img src="https://i.pravatar.cc/38?img=5" alt="頭像" class="student-avatar">
                <div class="student-info">
                    <div class="student-name" id="sidebar-name">學生</div>
                    <div class="student-role">學生</div>
                </div>
                <span class="material-symbols-outlined logout-icon">logout</span>
            </div>
        </aside>

        <!-- ===== 右側主內容區 ===== -->
        <main class="student-main">

            <!-- 頁面標題 -->
            <div class="student-chat-title px-3 py-2">
                <span class="material-symbols-outlined" style="color:#0055FF; font-size:18px;">chat_bubble</span>
                <span style="font-size:0.9rem; font-weight:900; margin-left:6px;">訊息中心</span>
            </div>

            <!-- 訊息中心主體 -->
            <div class="student-chat-wrap">

                <!-- 左側：聯絡人列表 -->
                <div class="contacts-panel" id="contacts-panel">
                    <div class="search-wrap">
                        <input type="text" id="search-input" class="form-control" placeholder="搜尋老師或課程…">
                    </div>
                    <div id="contact-list">
                        <!-- 由 student-messages.js 動態填入 -->
                    </div>
                </div>

                <!-- 右側：聊天視窗 -->
                <div class="chat-panel" id="chat-panel">

                    <!-- 聊天 Header -->
                    <div class="chat-header">
                        <button class="chat-back-btn" id="chat-back-btn">
                            <span class="material-symbols-outlined">arrow_back</span>
                        </button>
                        <img src="https://i.pravatar.cc/42?img=12" id="chat-teacher-avatar" class="chat-header-avatar" alt="老師頭像">
                        <div class="chat-header-info">
                            <div class="chat-header-name" id="chat-teacher-name">—</div>
                            <span class="chat-subject-tag" id="chat-subject-tag"></span>
                        </div>
                    </div>

                    <!-- 訊息區 -->
                    <div class="chat-messages" id="chat-messages">
                        <!-- 預設空白提示 -->
                        <div class="chat-empty-state" id="chat-empty-state">
                            <div class="empty-icon">
                                <span class="material-symbols-outlined">chat_bubble_outline</span>
                            </div>
                            <p>選擇左側聯絡人開始對話</p>
                        </div>
                    </div>

                    <!-- 輸入列 -->
                    <div class="chat-input-bar">
                        <input type="file" id="file-input" hidden>
                        <button class="btn-icon" type="button" title="附加檔案"
                            onclick="document.getElementById('file-input').click()">
                            <span class="material-symbols-outlined">attach_file</span>
                        </button>
                        <textarea class="msg-input" id="msg-input" rows="1"
                            placeholder="輸入訊息… (Enter 送出 / Shift+Enter 換行)"></textarea>
                        <button class="btn-send" type="button" onclick="sendMessage()">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </div>

                </div>
                <!-- end chat-panel -->

            </div>
            <!-- end student-chat-wrap -->

        </main>

    </div>
    <!-- end student-layout -->

    <!-- ===== Scripts ===== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/student-layout.js"></script>
    <script src="./assets/js/student-messages.js"></script>

    <!-- 檔案選擇後自動上傳 -->
    <script>
        document.getElementById('file-input').addEventListener('change', function () {
            if (this.files && this.files[0]) {
                uploadFile(this.files[0]);
                this.value = '';
            }
        });
    </script>

</body>

</html>
