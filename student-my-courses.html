<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge | 我的課程</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/scss/all.scss">
</head>

<body>

    <!-- 手機版頂部 Header -->
    <header class="student-mobile-header">
        <button class="btn-menu" id="sidebar-toggle">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <span class="logo-text nunito fst-italic">Merge</span>
        <div style="width: 40px;"></div>
    </header>

    <!-- 手機版遮罩 -->
    <div class="student-overlay" id="sidebar-overlay"></div>

    <div class="student-layout">

        <!-- ===== 左側導覽列 ===== -->
        <aside class="student-sidebar" id="student-sidebar">
            <div class="student-sidebar-logo">
                <div class="logo-icon">M</div>
                <div class="logo-text">
                    Merge
                    <span>學生後台</span>
                </div>
            </div>
            <nav class="flex-grow-1 py-2">
                <a href="student-dashboard.html" class="student-nav-link">
                    <span class="material-symbols-outlined">grid_view</span> 控制台
                </a>
                <a href="StudentChat.html" class="student-nav-link">
                    <span class="material-symbols-outlined">chat_bubble</span> 訊息中心
                </a>
                <a href="explore.html" class="student-nav-link">
                    <span class="material-symbols-outlined">search</span> 找老師
                </a>
                <a href="student-my-courses.html" class="student-nav-link active">
                    <span class="material-symbols-outlined">calendar_month</span> 我的課程
                </a>
                <a href="student-learning-records.html" class="student-nav-link">
                    <span class="material-symbols-outlined">history</span> 學習紀錄
                </a>
                <a href="student-credits.html" class="student-nav-link">
                    <span class="material-symbols-outlined">account_balance_wallet</span> 儲值明細
                </a>
                <a href="student-settings.html" class="student-nav-link">
                    <span class="material-symbols-outlined">settings</span> 設定
                </a>
            </nav>
            <div class="student-sidebar-footer" id="logout-btn">
                <img src="https://i.pravatar.cc/38?img=5" alt="頭像" class="student-avatar">
                <div class="student-info">
                    <div class="student-name" id="sidebar-name">學生</div>
                    <div class="student-role">學生</div>
                </div>
                <span class="material-symbols-outlined logout-icon">logout</span>
            </div>
        </aside>

        <!-- ===== 右側主內容區 ===== -->
        <main class="student-main">

            <!-- 頁面標題 -->
            <h1 class="student-page-title">我的課程</h1>

            <!-- 1. 摘要統計 -->
            <div class="row g-3 mb-4">
                <div class="col-4">
                    <div class="mc-stat-card">
                        <div class="mc-stat-icon" style="background:#EBF0FF; color:#0055FF;">
                            <span class="material-symbols-outlined">calendar_month</span>
                        </div>
                        <div class="mc-stat-value" id="stat-total">--</div>
                        <div class="mc-stat-label">總課程數</div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="mc-stat-card">
                        <div class="mc-stat-icon" style="background:#fffbe6; color:#b8860b;">
                            <span class="material-symbols-outlined">schedule</span>
                        </div>
                        <div class="mc-stat-value" id="stat-upcoming">--</div>
                        <div class="mc-stat-label">即將上課</div>
                    </div>
                </div>
                <div class="col-4">
                    <div class="mc-stat-card">
                        <div class="mc-stat-icon" style="background:#d1fae5; color:#065f46;">
                            <span class="material-symbols-outlined">task_alt</span>
                        </div>
                        <div class="mc-stat-value" id="stat-completed">--</div>
                        <div class="mc-stat-label">已完成</div>
                    </div>
                </div>
            </div>

            <!-- 2. 篩選 Tabs -->
            <div class="mc-tabs mb-3">
                <button class="mc-tab-btn active" data-filter="all">全部</button>
                <button class="mc-tab-btn" data-filter="upcoming">即將上課</button>
                <button class="mc-tab-btn" data-filter="completed">已完成</button>
                <button class="mc-tab-btn" data-filter="cancelled">已取消</button>
            </div>

            <!-- 3. 課程清單 -->
            <div class="s-card">
                <div class="s-card-header">
                    <h3>
                        <span class="material-symbols-outlined" style="font-size:18px; color:#0055FF; margin-right:6px;">list_alt</span>
                        課程列表
                    </h3>
                    <span id="course-count" style="font-size:0.78rem; color:#aaa; font-weight:600;">載入中…</span>
                </div>
                <div id="course-list">
                    <div style="text-align:center; color:#aaa; font-size:0.85rem; padding:24px;">載入中…</div>
                </div>
            </div>

        </main>
    </div>

    <!-- ===== 課程回饋 Modal ===== -->
    <div class="modal fade" id="feedbackModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:16px; border:3px solid #000; box-shadow:4px 4px 0 #000;">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <h5 class="modal-title fw-bold mb-0" style="color:#1A2238;">課程回饋</h5>
                        <p class="mb-0 mt-1" style="font-size:0.82rem; color:#94a3b8;" id="feedback-modal-info"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-2">
                    <label class="form-label fw-bold" style="font-size:0.85rem;">這堂課的心得或建議</label>
                    <textarea id="feedback-comment-input" class="form-control" rows="5"
                        placeholder="請填寫對這堂課的回饋…"
                        style="border:2px solid #000; border-radius:10px; resize:none; font-size:0.88rem;"></textarea>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn-close-modal" data-bs-dismiss="modal"
                        style="background:#fff; border:2px solid #000; border-radius:8px; padding:6px 16px; font-size:0.82rem; font-weight:700; cursor:pointer; box-shadow:2px 2px 0 #000;">
                        取消
                    </button>
                    <button type="button" id="btn-submit-feedback"
                        style="background:#0055FF; color:#fff; border:2px solid #000; border-radius:8px; padding:6px 16px; font-size:0.82rem; font-weight:700; cursor:pointer; box-shadow:2px 2px 0 #000; display:inline-flex; align-items:center; gap:4px;">
                        <span class="material-symbols-outlined" style="font-size:15px;">send</span> 送出回饋
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 課程評分 Modal ===== -->
    <div class="modal fade" id="ratingModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:16px; border:3px solid #000; box-shadow:4px 4px 0 #000;">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <h5 class="modal-title fw-bold mb-0" style="color:#1A2238;">課程評分</h5>
                        <p class="mb-0 mt-1" style="font-size:0.82rem; color:#94a3b8;" id="rating-modal-info"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-2">
                    <label class="form-label fw-bold" style="font-size:0.85rem;">整體評分</label>
                    <div id="rating-stars" class="d-flex gap-1 mb-3"></div>
                    <label class="form-label fw-bold" style="font-size:0.85rem;">留言（選填）</label>
                    <textarea id="rating-comment-input" class="form-control" rows="4"
                        placeholder="分享你的上課感受…"
                        style="border:2px solid #000; border-radius:10px; resize:none; font-size:0.88rem;"></textarea>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" data-bs-dismiss="modal"
                        style="background:#fff; border:2px solid #000; border-radius:8px; padding:6px 16px; font-size:0.82rem; font-weight:700; cursor:pointer; box-shadow:2px 2px 0 #000;">
                        取消
                    </button>
                    <button type="button" id="btn-submit-rating"
                        style="background:#0055FF; color:#fff; border:2px solid #000; border-radius:8px; padding:6px 16px; font-size:0.82rem; font-weight:700; cursor:pointer; box-shadow:2px 2px 0 #000; display:inline-flex; align-items:center; gap:4px;">
                        <span class="material-symbols-outlined" style="font-size:15px;">send</span> 送出評分
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/student-layout.js"></script>
    <script>
        // ── 常數對照表 ──
        const SUBJECT_MAP = {
            11: '低年級', 12: '中年級', 13: '高年級',
            21: 'GEPT', 22: 'YLE', 23: '國中先修', 31: '其他'
        };

        // status 整數：1=排程中, 2=已完成, 3=已取消, 4=系統退課
        function resolveStatus(course) {
            if (course.status === 2) return 'completed';
            if (course.status === 3 || course.status === 4) return 'cancelled';
            // status === 1：依時間判斷即將上課 vs 進行中
            const now = new Date();
            const [y, m, d] = course.date.split('-').map(Number);
            const lessonStart = new Date(y, m - 1, d, course.hour, 0, 0);
            const lessonEnd   = new Date(y, m - 1, d, course.hour + 1, 0, 0);
            if (now >= lessonStart && now < lessonEnd) return 'ongoing';
            return 'upcoming';
        }

        function getStatusInfo(statusKey) {
            switch (statusKey) {
                case 'upcoming':  return { label: '即將上課', cls: 'mc-status-upcoming'  };
                case 'ongoing':   return { label: '進行中',   cls: 'mc-status-ongoing'   };
                case 'completed': return { label: '已完成',   cls: 'mc-status-completed' };
                case 'cancelled': return { label: '已取消',   cls: 'mc-status-cancelled' };
                default:          return { label: '未知',     cls: ''                    };
            }
        }

        function formatCourseTime(dateStr, hour) {
            if (!dateStr) return '';
            const [y, m, d] = dateStr.split('-');
            return `${y}/${m}/${d} ${String(hour).padStart(2, '0')}:00`;
        }

        function getActionBtn(bookingId, statusKey) {
            if (statusKey === 'upcoming' || statusKey === 'ongoing') {
                return `<a href="Student-VideoRoom.html?bookingId=${bookingId}" class="mc-action-btn mc-action-primary">
                    <span class="material-symbols-outlined" style="font-size:16px;">videocam</span> 進入教室
                </a>`;
            }
            if (statusKey === 'completed') {
                return `<button class="mc-action-btn mc-action-secondary" onclick="openFeedbackModal(${bookingId})">
                    <span class="material-symbols-outlined" style="font-size:15px;">rate_review</span> 課程回饋
                </button>
                <button class="mc-action-btn mc-action-secondary ms-1" onclick="openRatingModal(${bookingId})">
                    <span class="material-symbols-outlined" style="font-size:15px;">star</span> 課程評分
                </button>`;
            }
            return '';
        }

        function handleApiError(err) {
            if (!err.response) { alert('無法連線至伺服器，請確認網路'); return; }
            if (err.response.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return; }
            if (err.response.status === 403) { alert('權限不足'); return; }
            alert('伺服器發生錯誤，請稍後再試');
        }

        let allCourses = [];   // 原始 API 資料
        let currentFilter = 'all';

        function renderCourses(courses) {
            const container = document.getElementById('course-list');
            const filtered = courses.filter(c => {
                if (currentFilter === 'all') return true;
                return c._statusKey === currentFilter;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="mc-empty-state">
                        <span class="material-symbols-outlined">calendar_month</span>
                        <p>${currentFilter === 'all' ? '目前沒有任何課程' : '此分類沒有課程'}</p>
                        ${currentFilter === 'all' ? '<a href="explore.html" class="mc-find-btn">找老師預約</a>' : ''}
                    </div>`;
                document.getElementById('course-count').textContent = '共 0 筆';
                return;
            }

            let html = '';
            filtered.forEach(course => {
                const statusInfo = getStatusInfo(course._statusKey);
                const actionBtn  = getActionBtn(course.bookingId, course._statusKey);
                const subjectLabel = SUBJECT_MAP[course.subject] || '課程';
                const timeLabel    = formatCourseTime(course.date, course.hour);

                html += `<div class="mc-course-item" data-status="${course._statusKey}">
                    <img src="https://i.pravatar.cc/44?img=${course.bookingId % 70 + 1}" alt="老師頭像" class="mc-teacher-avatar">
                    <div class="mc-course-info">
                        <div class="mc-course-teacher">${course.tutorName || '老師'}</div>
                        <div class="mc-course-meta">
                            <span class="mc-subject-badge">${subjectLabel}</span>
                            <span class="mc-course-time">
                                <span class="material-symbols-outlined" style="font-size:14px; vertical-align:-2px;">schedule</span>
                                ${timeLabel}
                            </span>
                            <span class="mc-course-duration">60 分鐘</span>
                        </div>
                    </div>
                    <div class="mc-course-right">
                        <span class="mc-status-badge ${statusInfo.cls}">${statusInfo.label}</span>
                        ${actionBtn}
                    </div>
                </div>`;
            });

            container.innerHTML = html;
            document.getElementById('course-count').textContent = '共 ' + filtered.length + ' 筆';
        }

        function updateStats(courses) {
            document.getElementById('stat-total').textContent = courses.length;
            document.getElementById('stat-upcoming').textContent =
                courses.filter(c => c._statusKey === 'upcoming' || c._statusKey === 'ongoing').length;
            document.getElementById('stat-completed').textContent =
                courses.filter(c => c._statusKey === 'completed').length;
        }

        // Tab 切換
        document.querySelectorAll('.mc-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mc-tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderCourses(allCourses);
            });
        });

        // ── 課程回饋 ──
        let currentFeedbackBookingId = null;
        let currentFeedbackId = null;

        async function openFeedbackModal(bookingId) {
            currentFeedbackBookingId = bookingId;
            currentFeedbackId = null;

            const course = allCourses.find(c => c.bookingId === bookingId);
            const infoEl = document.getElementById('feedback-modal-info');
            if (course) {
                infoEl.textContent = `${course.tutorName || '老師'} · ${formatCourseTime(course.date, course.hour)}`;
            }

            const commentEl = document.getElementById('feedback-comment-input');
            commentEl.value = '';

            // 檢查是否已有回饋
            try {
                const res = await axios.get(`${API_BASE_URL}/feedbacks/lesson/${bookingId}`);
                const feedbacks = res.data;
                if (feedbacks && feedbacks.length > 0) {
                    const existing = feedbacks[0];
                    currentFeedbackId = existing.id;
                    commentEl.value = existing.comment || '';
                }
            } catch (e) {
                // 無法取得現有回饋，繼續開啟空白表單
            }

            new bootstrap.Modal(document.getElementById('feedbackModal')).show();
        }

        document.getElementById('btn-submit-feedback').addEventListener('click', async () => {
            const comment = document.getElementById('feedback-comment-input').value.trim();
            if (!comment) { alert('請填寫回饋內容'); return; }

            const btn = document.getElementById('btn-submit-feedback');
            btn.disabled = true;

            const payload = { bookingId: currentFeedbackBookingId, comment };

            try {
                if (currentFeedbackId) {
                    await axios.put(`${API_BASE_URL}/feedbacks/${currentFeedbackId}`, payload);
                } else {
                    await axios.post(`${API_BASE_URL}/feedbacks`, payload);
                }
                alert('✅ 課程回饋已送出！');
                bootstrap.Modal.getInstance(document.getElementById('feedbackModal')).hide();
            } catch (err) {
                handleApiError(err);
            } finally {
                btn.disabled = false;
            }
        });

        // ── 課程評分 ──
        let currentRatingBookingId = null;
        let currentRating = 0;

        function renderRatingStars() {
            const container = document.getElementById('rating-stars');
            container.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const btn = document.createElement('button');
                btn.className = 'mc-star-btn' + (i <= currentRating ? ' active' : '');
                btn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings:'FILL' ${i <= currentRating ? 1 : 0},'wght' 400;">star</span>`;
                btn.addEventListener('click', () => { currentRating = i; renderRatingStars(); });
                container.appendChild(btn);
            }
        }

        function openRatingModal(bookingId) {
            currentRatingBookingId = bookingId;
            currentRating = 0;

            const course = allCourses.find(c => c.bookingId === bookingId);
            const infoEl = document.getElementById('rating-modal-info');
            if (course) {
                infoEl.textContent = `${course.tutorName || '老師'} · ${formatCourseTime(course.date, course.hour)}`;
            }

            document.getElementById('rating-comment-input').value = '';
            renderRatingStars();

            new bootstrap.Modal(document.getElementById('ratingModal')).show();
        }

        document.getElementById('btn-submit-rating').addEventListener('click', async () => {
            if (!currentRating) { alert('請選擇評分星數'); return; }

            const btn = document.getElementById('btn-submit-rating');
            btn.disabled = true;

            const payload = {
                bookingId: currentRatingBookingId,
                rating: currentRating,
                comment: document.getElementById('rating-comment-input').value.trim()
            };

            try {
                await axios.post(`${API_BASE_URL}/reviews`, payload);
                alert('✅ 課程評分已送出！');
                bootstrap.Modal.getInstance(document.getElementById('ratingModal')).hide();
            } catch (err) {
                handleApiError(err);
            } finally {
                btn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem('userId');
            if (!userId) return;

            try {
                // GET /api/courses/me?userId={userId}
                // 回傳 BookingResponseDTO[]：bookingId, tutorName, subject(int), date, hour, status(int)
                const res = await axios.get(API_BASE_URL + '/courses/me', { params: { userId } });
                allCourses = (res.data || []).map(c => ({
                    ...c,
                    _statusKey: resolveStatus(c)   // 附加前端計算的狀態字串
                }));
                // 依日期降序排列（最新在上）
                allCourses.sort((a, b) => {
                    const da = new Date(a.date + 'T' + String(a.hour).padStart(2, '0') + ':00:00');
                    const db = new Date(b.date + 'T' + String(b.hour).padStart(2, '0') + ':00:00');
                    return db - da;
                });
                updateStats(allCourses);
                renderCourses(allCourses);
            } catch (err) {
                handleApiError(err);
            }
        });
    </script>
</body>

</html>
