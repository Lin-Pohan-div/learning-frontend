        <!-- 選單 -->

            <a href="teacher-schedule.html" class="teacher-nav-link">

            <a href="teacher-courses.html" class="teacher-nav-link active">
                <span class="material-symbols-outlined">menu_book</span> 課程管理

            <span class="material-symbols-outlined logout-icon">logout</span>

        <h1 class="teacher-page-title">課程管理</h1>
