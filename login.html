<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./assets/scss/all.scss" />
  </head>
  <body>
    <header class="border-bottom py-2">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <!-- logo -->
          <div class="d-flex">
            <a href="index.html" class="text-decoration-none">
              <h1 class="nunito fst-italic display-5 pt-2">Merge</h1>
            </a>
          </div>
          <!-- nav -->
          <nav class="ms-auto pt-2">
            <ul class="list-unstyled d-flex">
              <li>
                <a href="#" class="text-decoration-none px-3 ms-auto"
                  >我要找學生</a
                >
              </li>
              <li>
                <a href="#" class="text-decoration-none px-3">我要找老師</a>
              </li>
              <li>
                <a href="#" class="text-decoration-none px-3">註冊送代幣</a>
              </li>
              <li>
                <a href="#" class="text-decoration-none px-3 pe-0">LOGIN</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <main class="pb-5">
      <div class="bg-line">
        <h2 class="sansTitle text-center pt-5 text-pink">LOGIN</h2>
        <hr />
      </div>

      <!-- login start -->
      <section class="container">
        <!-- card start -->

        <div class="row justify-content-center">
          <div class="col-11 col-md-3 card border-0 shadow-lg rounded-4 mb-3">
            <div
              class="card-body d-flex justify-content-center align-items-center flex-column position-relative"
            >
              <div
                class="bg-dark rounded-circle border border-2 border-dark position-absolute top-0 start-50 translate-middle d-flex align-items-center justify-content-center shadow"
                style="width: 130px; height: 130px; overflow: hidden"
              >
                <dotlottie-wc
                  src="https://lottie.host/3ad56864-47bd-490b-92ab-25274f9773d5/R3RFdr3ZjP.lottie"
                  style="width: 140px; height: 150px"
                  autoplay
                  loop
                >
                </dotlottie-wc>
              </div>

              <!-- form start -->
              <form class="mt-5 pt-4 w-100">
                <div class="mb-3">
                  <label for="exampleInputEmail1" class="form-label"
                    >請輸入你的信箱</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="exampleInputEmail1"
                    aria-describedby="emailHelp"
                  />
                </div>
                <div class="mb-3">
                  <label for="exampleInputPassword1" class="form-label"
                    >請輸入你的密碼</label
                  >
                  <input
                    type="password"
                    class="form-control"
                    id="exampleInputPassword1"
                  />
                </div>
                <div class="mb-3 form-check">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="exampleCheck1"
                  />
                  <label class="form-check-label" for="exampleCheck1"
                    >記得我</label
                  >
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  上課去！
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="bg-white border-top py-5 mt-auto">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
            <a
              href="index.html"
              class="text-decoration-none d-flex align-items-center justify-content-center justify-content-md-start"
            >
              <h3 class="nunito fst-italic mb-0 me-2 text-primary">Merge</h3>
              <span class="text-muted small">&copy; 2026</span>
            </a>
          </div>

          <div class="col-md-4 mb-3 mb-md-0">
            <ul class="list-unstyled d-flex justify-content-center mb-0 small">
              <li>
                <a href="#" class="text-muted text-decoration-none px-2"
                  >服務條款</a
                >
              </li>
              <li>
                <a href="#" class="text-muted text-decoration-none px-2"
                  >隱私政策</a
                >
              </li>
              <li>
                <a href="#" class="text-muted text-decoration-none px-2"
                  >聯絡我們</a
                >
              </li>
            </ul>
          </div>

          <div class="col-md-4 text-center text-md-end">
            <a href="#" class="text-muted me-3"
              ><i class="bi bi-facebook"></i
            ></a>
            <a href="#" class="text-muted me-3"
              ><i class="bi bi-instagram"></i
            ></a>
            <a href="#" class="text-muted"><i class="bi bi-github"></i></a>
          </div>
        </div>
      </div>
    </footer>
    <script
      src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.3/dist/dotlottie-wc.js"
      type="module"
    ></script>
    <script type="module" src="./assets/js/main.js"></script>
  </body>
</html>
